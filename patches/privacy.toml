# =============================================================================
# 8. OAUTH - Enforce loopback-only callbacks
# =============================================================================

[[patches]]
id = "privacy-oauth-enforce-loopback-callback-url-host"
file = "rmcp-client/src/perform_oauth_login.rs"
version = ">=0.105.0-alpha.13"

[patches.query]
type = "text"
search = '''
    let callback_url = callback_url.as_str();
'''

[patches.operation]
type = "replace"
text = '''
    // PRIVACY PATCH: Enforce loopback-only callback URL host.
    fn is_loopback_host(url: &str) -> bool {
        url::Url::parse(url)
            .map(|u| {
                u.host_str()
                    .map(|h| h == "127.0.0.1" || h == "localhost" || h == "::1")
                    .unwrap_or(false)
            })
            .unwrap_or(false)
    }
    if !is_loopback_host(callback_url.as_str()) {
        return Err(anyhow::anyhow!("PRIVACY: OAuth callback URL must use loopback host"));
    }
    let callback_url = callback_url.as_str();
'''


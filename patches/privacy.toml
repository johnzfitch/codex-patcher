# 5. WEB SEARCH - Default disabled
# =============================================================================

[[patches]]
id = "privacy-web-search-default-disabled"
file = "core/src/config/mod.rs"
version = ">=0.99.0-alpha.14, <0.105.0-alpha.13"

[patches.query]
type = "text"
search = '''
        let web_search_mode = resolve_web_search_mode(&cfg, &config_profile, &features)
            .unwrap_or(WebSearchMode::Cached);
'''

[patches.operation]
type = "replace"
text = '''
        let web_search_mode = resolve_web_search_mode(&cfg, &config_profile, &features)
            .unwrap_or(WebSearchMode::Disabled); // PRIVACY PATCH: Default to Disabled
'''

[[patches]]
id = "privacy-web-search-no-sandbox-upgrade"
file = "core/src/config/mod.rs"
version = ">=0.99.0-alpha.14, <0.105.0-alpha.13"

[patches.query]
type = "ast-grep"
pattern = '''
pub(crate) fn resolve_web_search_mode_for_turn($$$PARAMS) -> WebSearchMode {
    $$$BODY
}
'''

[patches.operation]
type = "replace"
text = '''
pub(crate) fn resolve_web_search_mode_for_turn(
    web_search_mode: &Constrained<WebSearchMode>,
    _sandbox_policy: &SandboxPolicy,
) -> WebSearchMode {
    // PRIVACY PATCH: Do not upgrade to Live based on sandbox policy.
    let preferred = web_search_mode.value();
    if web_search_mode.can_set(&preferred).is_ok() {
        return preferred;
    }
    WebSearchMode::Disabled
}
'''


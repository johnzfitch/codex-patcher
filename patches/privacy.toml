# =============================================================================
# UNIFIED PRIVACY PATCHES
# =============================================================================
#
# Comprehensive privacy hardening for codex-rs across all supported versions.
# Each patch has an optional `version` field for version-specific constraints.
# Patches without a version field apply to all versions.
#
# Supported version ranges:
# - 0.99.0-alpha.14 through 0.104.x
# - 0.105.0-alpha.13 through 0.107.x
# - 0.108.0-alpha.1 and later
#
# Categories:
# 1. Statsig telemetry (disable metrics export)
# 2. Turn metadata (disable git/sandbox headers)
# 3. Analytics (disable skill/app tracking)
# 4. Realtime conversation (remove config overrides, debug logging)
# 5. Web search (default disabled)
# 6. Sandbox metrics (remove tags)
# 7. Git tracking (redact origin URL)
# 8. OAuth (enforce loopback)
# 9. External logos (remove query)
# 10. Config hardening (force non-login shell, etc.)
#
# =============================================================================

[meta]
name = "privacy"
description = "Comprehensive privacy hardening for codex-rs"
workspace_relative = true
# No version_range - file applies to all, individual patches have constraints

# =============================================================================
# 1. STATSIG TELEMETRY - Disable metrics export to external service
# =============================================================================

[[patches]]
id = "privacy-disable-statsig-resolver"
file = "otel/src/config.rs"

[patches.query]
type = "ast-grep"
pattern = '''
pub(crate) fn resolve_exporter(exporter: &OtelExporter) -> OtelExporter {
    $$$
}
'''

[patches.operation]
type = "replace"
text = '''
pub(crate) fn resolve_exporter(exporter: &OtelExporter) -> OtelExporter {
    match exporter {
        OtelExporter::Statsig => {
            // PRIVACY PATCH: Always return None to disable Statsig telemetry.
            OtelExporter::None
        }
        _ => exporter.clone(),
    }
}
'''

[[patches]]
id = "privacy-remove-statsig-endpoint"
file = "otel/src/config.rs"

[patches.query]
type = "ast-grep"
pattern = '''
pub(crate) const STATSIG_OTLP_HTTP_ENDPOINT: $TYPE = $VALUE;
'''

[patches.operation]
type = "delete"
insert_comment = "// PRIVACY PATCH: Statsig endpoint removed"

[[patches]]
id = "privacy-remove-statsig-header"
file = "otel/src/config.rs"

[patches.query]
type = "ast-grep"
pattern = '''
pub(crate) const STATSIG_API_KEY_HEADER: $TYPE = $VALUE;
'''

[patches.operation]
type = "delete"
insert_comment = "// PRIVACY PATCH: Statsig API key header removed"

[[patches]]
id = "privacy-remove-statsig-api-key"
file = "otel/src/config.rs"

[patches.query]
type = "ast-grep"
pattern = '''
pub(crate) const STATSIG_API_KEY: $TYPE = $VALUE;
'''

[patches.operation]
type = "delete"
insert_comment = "// PRIVACY PATCH: Statsig API key removed"

[[patches]]
id = "privacy-default-metrics-none-types"
file = "core/src/config/types.rs"

[patches.query]
type = "ast-grep"
pattern = '''
impl Default for OtelConfig {
    fn default() -> Self {
        $$$
    }
}
'''

[patches.operation]
type = "replace"
text = '''
impl Default for OtelConfig {
    fn default() -> Self {
        OtelConfig {
            log_user_prompt: false,
            environment: DEFAULT_OTEL_ENVIRONMENT.to_owned(),
            exporter: OtelExporterKind::None,
            trace_exporter: OtelExporterKind::None,
            metrics_exporter: OtelExporterKind::None, // PRIVACY PATCH: Changed from Statsig
        }
    }
}
'''

[[patches]]
id = "privacy-config-metrics-exporter-default-none"
file = "core/src/config/mod.rs"

[patches.query]
type = "text"
search = '''
                let metrics_exporter = t.metrics_exporter.unwrap_or(OtelExporterKind::Statsig);
'''

[patches.operation]
type = "replace"
text = '''
                let metrics_exporter = t.metrics_exporter.unwrap_or(OtelExporterKind::None); // PRIVACY PATCH
'''

[[patches]]
id = "privacy-metrics-exporter-test-default-none"
file = "core/src/config/mod.rs"

[patches.query]
type = "text"
search = '''
        assert_eq!(config.otel.metrics_exporter, OtelExporterKind::Statsig);
'''

[patches.operation]
type = "replace"
text = '''
        assert_eq!(config.otel.metrics_exporter, OtelExporterKind::None); // PRIVACY PATCH
'''

# =============================================================================
# 2. TURN METADATA - Disable git/sandbox headers
# =============================================================================

[[patches]]
id = "privacy-build-turn-metadata-header-noop"
file = "core/src/turn_metadata.rs"

[patches.query]
type = "ast-grep"
pattern = '''
pub fn build_turn_metadata_header($$$PARAMS) -> Option<String> {
    $$$BODY
}
'''

[patches.operation]
type = "replace"
text = '''
pub fn build_turn_metadata_header() -> Option<String> {
    // PRIVACY PATCH: Disable per-turn metadata headers.
    None
}
'''

[[patches]]
id = "privacy-turn-metadata-state-current-header-always-none"
file = "core/src/turn_metadata.rs"
version = ">=0.105.0-alpha.13"

[patches.query]
type = "text"
search = '''
    pub fn current_header(&self) -> Option<String> {
        self.enriched_header.clone()
    }
'''

[patches.operation]
type = "replace"
text = '''
    pub fn current_header(&self) -> Option<String> {
        // PRIVACY PATCH: Always return None to disable turn metadata headers.
        let _ = &self.enriched_header; // Suppress unused field warning
        None
    }
'''

[[patches]]
id = "privacy-turn-metadata-state-disable-enrichment"
file = "core/src/turn_metadata.rs"
version = ">=0.105.0-alpha.13"

[patches.query]
type = "text"
search = '''
    pub fn set_enriched_header(&mut self, header: Option<String>) {
        self.enriched_header = header;
    }
'''

[patches.operation]
type = "replace"
text = '''
    pub fn set_enriched_header(&mut self, header: Option<String>) {
        // PRIVACY PATCH: Discard enriched header to prevent metadata emission.
        let _ = header;
        self.enriched_header = None;
    }
'''

[[patches]]
id = "privacy-remove-turn-metadata-header-constant"
file = "core/src/client.rs"
version = ">=0.105.0-alpha.13"

[patches.query]
type = "text"
search = '''
pub const TURN_METADATA_HEADER: &str = "x-codex-turn-metadata";
'''

[patches.operation]
type = "replace"
text = '''
// PRIVACY PATCH: Turn metadata header constant removed.
'''

[[patches]]
id = "privacy-disable-http-turn-metadata-header-insertion"
file = "core/src/client.rs"
version = ">=0.105.0-alpha.13"

[patches.query]
type = "text"
search = '''
        if let Some(metadata) = &self.turn_metadata {
            request = request.header(TURN_METADATA_HEADER, metadata);
        }
'''

[patches.operation]
type = "replace"
text = '''
        if let Some(metadata) = &self.turn_metadata {
            // PRIVACY PATCH: Do not send turn metadata header.
            let _ = metadata;
        }
'''


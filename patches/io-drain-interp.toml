# =============================================================================
# IO-DRAIN INTERPRETABILITY - Instrument the exec pipeline for observability
# =============================================================================
#
# Adds tracing hooks to the actual functions in the IO drain path so the
# behavior is observable end-to-end when running codex normally. No synthetic
# tests — just run any tool that backgrounds a subprocess and the logs show
# exactly what happens at each stage.
#
# Instrumentation points:
# 1. read_capped — logs each read() and running buffer size
# 2. read_capped return — logs final buffer size at EOF
# 3. await_with_timeout timeout — logs that buffered data will be destroyed
# 4. child.wait() — logs when child exits (pipes may still be open)
# 5. consume_truncated_output — logs what the model actually receives
# 6. exec_drain_trace test — exercises the path, hooks tell the story
#
# Version: Targets Codex rust-v0.108.0-alpha.4 and later
# =============================================================================

[meta]
name = "io-drain-interp"
description = "Instrument the IO drain pipeline for end-to-end observability"
version_range = ">=0.0.0"
workspace_relative = true

# =============================================================================
# Patch 1: Instrument read_capped — log each read and final buffer size
#
# NOTE: ID prefixed with "a-" so it applies BEFORE patches that modify
# consume_truncated_output (which shares the closing "}" boundary).
# =============================================================================

[[patches]]
id = "1-read-capped-accumulation"
file = "core/src/exec.rs"

[patches.query]
type = "text"
search = '''
        append_capped(&mut buf, &tmp[..n], EXEC_OUTPUT_MAX_BYTES);
        // Continue reading to EOF to avoid back-pressure
    }

    Ok(StreamOutput {
        text: buf,
        truncated_after_lines: None,
    })
}

#[cfg(unix)]
fn synthetic_exit_status(code: i32) -> ExitStatus {
'''

[patches.operation]
type = "replace"
text = '''
        append_capped(&mut buf, &tmp[..n], EXEC_OUTPUT_MAX_BYTES);
        tracing::debug!(
            stream = if is_stderr { "stderr" } else { "stdout" },
            chunk_bytes = n,
            buffer_bytes = buf.len(),
            "read_capped: read chunk, buffer now {} bytes",
            buf.len(),
        );
        // Continue reading to EOF to avoid back-pressure
    }

    tracing::info!(
        stream = if is_stderr { "stderr" } else { "stdout" },
        final_bytes = buf.len(),
        "read_capped: EOF reached, returning {} bytes to caller",
        buf.len(),
    );
    Ok(StreamOutput {
        text: buf,
        truncated_after_lines: None,
    })
}


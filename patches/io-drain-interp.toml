[patches.operation]
type = "replace"
text = '''
        assert!(killed, "grandchild process with pid {pid} is still alive");
        Ok(())
    }

    /// Runs a realistic tool command through the exec pipeline.
    /// No assertions — the tracing hooks on read_capped,
    /// await_with_timeout, and consume_truncated_output log
    /// exactly what happens at each stage.
    ///
    /// Run with: RUST_LOG=codex_core::exec=debug cargo test \
    ///   -p codex-core --lib exec_drain_trace -- --nocapture
    #[cfg(unix)]
    #[tokio::test]
    async fn exec_drain_trace() -> Result<()> {
        use std::os::unix::fs::PermissionsExt;

        let tmp_dir = std::env::temp_dir().join("drain_trace");
        let _ = std::fs::create_dir_all(&tmp_dir);

        let src_file = tmp_dir.join("handler.rs");
        std::fs::write(
            &src_file,
            "use std::net::TcpStream;\n\n\
             fn handle(stream: TcpStream) {\n\
             \x20   // TODO: validate input\n\
             \x20   let data = read_all(&stream);\n\
             \x20   // TODO: add rate limiting\n\
             \x20   process(data);\n\
             }\n",
        )?;

        let tool = tmp_dir.join("search_todos.sh");
        std::fs::write(
            &tool,
            format!(
                "#!/bin/bash\n\
                 grep -n TODO \"{}\" 2>/dev/null\n\
                 ( sleep 5 ) &\n\
                 exit $?\n",
                src_file.display()
            ),
        )?;
        std::fs::set_permissions(&tool, std::fs::Permissions::from_mode(0o755))?;

        let params = ExecParams {
            command: vec![tool.to_string_lossy().to_string()],
            cwd: tmp_dir.clone(),
            expiration: 10_000.into(),
            env: std::env::vars().collect(),
            network: None,
            sandbox_permissions: SandboxPermissions::UseDefault,
            windows_sandbox_level:
                codex_protocol::config_types::WindowsSandboxLevel::Disabled,
            justification: None,
            arg0: None,
        };

        let output = exec(
            params,
            SandboxType::None,
            &SandboxPolicy::new_read_only_policy(),
            None,
        )
        .await?;

        let stdout_text = String::from_utf8_lossy(&output.stdout.text);
        eprintln!(
            "\n--- exec_drain_trace result ---\n\
             exit_code:  {:?}\n\
             timed_out:  {}\n\
             stdout_len: {} bytes\n\
             stdout:     {:?}\n\
             truncated:  {:?}\n\
             ---",
            output.exit_status.code(),
            output.timed_out,
            output.stdout.text.len(),
            stdout_text,
            output.stdout.truncated_after_lines,
        );

        let _ = std::fs::remove_dir_all(&tmp_dir);
        Ok(())
    }

    #[tokio::test]
    async fn process_exec_tool_call_respects_cancellation_token() -> Result<()> {
'''

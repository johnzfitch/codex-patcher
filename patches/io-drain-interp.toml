# =============================================================================
# Patch 2: Instrument await_with_timeout — log the discard
# =============================================================================

[[patches]]
id = "2-await-with-timeout-discard"
file = "core/src/exec.rs"

[patches.query]
type = "text"
search = '''
            Err(_elapsed) => {
                // Timeout: abort the task to avoid hanging on open pipes.
                handle.abort();
'''

[patches.operation]
type = "replace"
text = '''
            Err(_elapsed) => {
                // Timeout: abort the task to avoid hanging on open pipes.
                // INTERP: The read task's buffer is task-local (Vec<u8>).
                // abort() drops the task AND the buffer. All data is lost.
                // The caller receives Vec::new() with no truncation signal.
                tracing::warn!(
                    timeout_ms = IO_DRAIN_TIMEOUT_MS,
                    "IO_DRAIN_TIMEOUT: pipe still open after {}ms — \
                     aborting read task. Task-local buffer will be DROPPED. \
                     Model will receive empty output with truncated=None.",
                    IO_DRAIN_TIMEOUT_MS,
                );
                handle.abort();
'''

# =============================================================================
# Patch 3: Instrument child.wait() — log when child exits
# =============================================================================

[[patches]]
id = "3-child-wait-pipe-state"
file = "core/src/exec.rs"

[patches.query]
type = "text"
search = '''
    let (exit_status, timed_out) = tokio::select! {
        status_result = child.wait() => {
            let exit_status = status_result?;
            (exit_status, false)
        }
'''

[patches.operation]
type = "replace"
text = '''
    let (exit_status, timed_out) = tokio::select! {
        status_result = child.wait() => {
            let exit_status = status_result?;
            tracing::info!(
                exit_code = exit_status.code(),
                "child process exited — read tasks may still be \
                 waiting for EOF if grandchildren hold pipes open",
            );
            (exit_status, false)
        }
'''

# =============================================================================
# Patch 4: Instrument consume_truncated_output — log what model receives
# =============================================================================

[[patches]]
id = "4-consume-output-final"
file = "core/src/exec.rs"

[patches.query]
type = "text"
search = '''
    let aggregated_output = aggregate_output(&stdout, &stderr);

    Ok(RawExecToolCallOutput {
        exit_status,
        stdout,
        stderr,
        aggregated_output,
        timed_out,
    })
}

async fn read_capped<R: AsyncRead + Unpin + Send + 'static>(
    mut reader: R,
'''

[patches.operation]
type = "replace"
text = '''
    let aggregated_output = aggregate_output(&stdout, &stderr);

    tracing::info!(
        stdout_bytes = stdout.text.len(),
        stderr_bytes = stderr.text.len(),
        timed_out = timed_out,
        exit_code = exit_status.code(),
        stdout_truncated = ?stdout.truncated_after_lines,
        stderr_truncated = ?stderr.truncated_after_lines,
        "MODEL RECEIVES: stdout={} bytes, stderr={} bytes, \
         timed_out={}, truncated={:?}",
        stdout.text.len(),
        stderr.text.len(),
        timed_out,
        stdout.truncated_after_lines,
    );

    Ok(RawExecToolCallOutput {
        exit_status,
        stdout,
        stderr,
        aggregated_output,
        timed_out,
    })
}

